<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cek Rekening Pitersnacks</title>
    <style>
        /* Gaya dikit biar seirama sama branding kamu */
        body { background: #1a1a1a; color: #ff0000; font-family: sans-serif; text-align: center; padding: 50px; }
        input, select, button { padding: 10px; margin: 10px; border-radius: 5px; border: none; }
        button { background: #ff0000; color: white; cursor: pointer; font-weight: bold; }
        #hasil { margin-top: 20px; padding: 15px; border: 1px solid #444; display: none; }
    </style>
</head>
<body>

    <h2>VALIDASI REKENING PELANGGAN</h2>
    
    <select id="bank">
        <option value="bca">BCA</option>
        <option value="mandiri">MANDIRI</option>
        <option value="bni">BNI</option>
        <option value="bri">BRI</option>
    </select>
    <br>
    <input type="number" id="norek" placeholder="Masukkan Nomor Rekening">
    <br>
    <button onclick="prosesValidasi()">CEK SEKARANG</button>

    <div id="hasil"></div>

    <script>
        async function prosesValidasi() {
            const bank = document.getElementById('bank').value;
            const norek = document.getElementById('norek').value;
            const hasilDiv = document.getElementById('hasil');
            
            // API KEY PREMIUM KAMU
            const myKey = "xy9sQ9AcQwFZcNeiSTSrwZoEDGh9dsdW7e8IJ2GqAlgsb72oqX";

            hasilDiv.style.display = "block";
            hasilDiv.innerText = "Sabar, lagi nembak server...";

            try {
                // Pastikan endpoint URL ini sesuai dengan dokumentasi api.co.id terbaru
                const response = await fetch(`https://api.co.id/v1/bank/check?bank=${bank}&account=${norek}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${myKey}`,
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.status === "success" || data.status === true) {
                    hasilDiv.style.color = "#00ff00"; // Warna Hijau kalau sukses
                    hasilDiv.innerHTML = `<strong>REKENING VALID!</strong><br>Nama: ${data.data.account_name}`;
                } else {
                    hasilDiv.style.color = "#ff0000";
                    hasilDiv.innerText = "Gagal: " + (data.message || "Rekening tidak ditemukan");
                }

            } catch (err) {
                hasilDiv.style.color = "#ff0000";
                hasilDiv.innerText = "ERROR KONEKSI! Pastikan Whitelist IP sudah di-set di dashboard.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
