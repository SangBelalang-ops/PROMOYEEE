<!DOCTYPE html>
<html>
<head>
    <title>VALIDASI REKENING PREMIUM</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #222; padding: 30px; border-radius: 10px; width: 350px; border: 1px solid #444; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        #output { margin-top: 20px; text-align: center; padding: 15px; background: #000; border-radius: 5px; }
        .nama { color: #00ff00; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="text-align:center">CEK REKENING INDONESIA</h3>
    <select id="bank">
        <option value="bca">BCA</option>
        <option value="mandiri">MANDIRI</option>
        <option value="bri">BRI</option>
        <option value="bni">BNI</option>
        <option value="seabank">SEABANK</option>
        <option value="jago">BANK JAGO</option>
        <option value="dana">DANA</option>
        <option value="ovo">OVO</option>
    </select>
    <input type="text" id="norek" placeholder="Nomor Rekening">
    <button onclick="gasCek()">VALIDASI SEKARANG</button>
    <div id="output">Hasil muncul di sini...</div>
</div>

<script>
async function gasCek() {
    const bank = document.getElementById('bank').value;
    const norek = document.getElementById('norek').value;
    const out = document.getElementById('output');

    if(!norek) return alert("Isi nomor rekening!");

    out.innerHTML = "Menghubungkan ke Bank...";

    // API KEY PREMIUM LO
    const KEY = "aFVBKbUGW15JPwN3to5L7DiyN0QY1syLI4p4jVQ5N0VnsgYHRs";
    const URL = `https://use.api.co.id/v1/bank/inquiry?bank_code=${bank}&account_number=${norek}`;

    try {
        const response = await fetch(URL, {
            method: 'GET',
            headers: { 'x-api-co-id': KEY }
        });

        const res = await response.json();

        if(res.status === "success") {
            // Karena Premium, ini HARUSNYA Nama Lengkap
            out.innerHTML = `NAMA PEMILIK:<br><span class="nama">${res.data.account_name}</span>`;
        } else {
            out.innerHTML = "GAGAL: " + res.message;
        }
    } catch (e) {
        out.innerHTML = "<b style='color:red'>BROWSER MEMBLOKIR KONEKSI!</b><br><small>Solusi: Aktifkan Ekstensi 'Allow CORS' di Chrome atau upload file ini ke Hosting.</small>";
    }
}
</script>

</body>
</html>
