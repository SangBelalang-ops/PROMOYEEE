<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tersnacks - Bank Validation</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 40px; }
        .card { background: #111; border: 2px solid #ff0000; padding: 25px; border-radius: 15px; width: 100%; max-width: 380px; box-shadow: 0 0 20px #ff0000; }
        h2 { color: #ff0000; text-align: center; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
        
        label { font-size: 12px; color: #888; margin-left: 5px; }
        select, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; box-sizing: border-box; font-size: 14px; outline: none; }
        
        select, input { background: #222; color: #fff; transition: 0.3s; }
        select:focus, input:focus { border-color: #ff0000; box-shadow: 0 0 5px #ff0000; }
        
        button { background: #ff0000; color: #fff; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #b30000; transform: scale(1.02); }
        
        #result { margin-top: 20px; padding: 15px; border-top: 1px solid #333; text-align: center; min-height: 50px; line-height: 1.6; }
        .valid { color: #00ff00; font-weight: bold; }
        .invalid { color: #ffae00; font-weight: bold; }
        .error { color: #ff0000; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Bank Validation</h2>
    
    <label>Pilih Bank:</label>
    <select id="bankCode">
        <option value="">-- PILIH BANK --</option>
        <option value="bca">BCA (Bank Central Asia)</option>
        <option value="bri">BRI (Bank Rakyat Indonesia)</option>
        <option value="bni">BNI (Bank Negara Indonesia)</option>
        <option value="mandiri">Mandiri</option>
        <option value="bsi">BSI (Bank Syariah Indonesia)</option>
        <option value="seabank">SeaBank Indonesia</option>
        <option value="cimb">CIMB Niaga</option>
        <option value="danamon">Danamon</option>
        <option value="jago">Bank Jago</option>
        <option value="neo">Bank Neo Commerce</option>
    </select>
    
    <label>Nomor Rekening:</label>
    <input type="text" id="accNumber" placeholder="Contoh: 1234567890">
    
    <label>Nama Sesuai Buku Tabungan:</label>
    <input type="text" id="accName" placeholder="Contoh: Alvin Phanestu">
    
    <button onclick="cekRekening()">VERIFIKASI REKENING</button>

    <div id="result">Input data pelanggan untuk memverifikasi pembayaran.</div>
</div>

<script>
    async function cekRekening() {
        const bank = document.getElementById('bankCode').value;
        const norek = document.getElementById('accNumber').value;
        const namaInput = document.getElementById('accName').value;
        const hasil = document.getElementById('result');
        
        // KONFIGURASI API SESUAI DOKUMEN LO
        const API_KEY = "aFVBKbUGW15JPwN3to5L7DiyN0QY1syLI4p4jVQ5N0VnsgYHRs"; 
        const BASE_URL = "https://use.api.co.id/validation/bank";

        if(!bank || !norek || !namaInput) {
            hasil.innerHTML = "<span class='error'>Semua kolom wajib diisi!</span>";
            return;
        }

        hasil.innerHTML = "<span style='color:cyan'>Sedang memvalidasi ke server bank...</span>";

        // Susun Query Parameters
        const params = new URLSearchParams({
            bank_code: bank,
            account_number: norek,
            account_name: namaInput
        });

        try {
            const response = await fetch(`${BASE_URL}?${params.toString()}`, {
                method: 'GET',
                headers: {
                    'x-api-co-id': API_KEY // Header khusus sesuai dokumentasi
                }
            });

            const res = await response.json();

            if (res.is_valid === true) {
                // Berhasil jika score >= 7.0
                hasil.innerHTML = `
                    <div class="valid">
                        ✅ VALIDATION SUCCESS <br>
                        <span style="color:#fff">${res.name}</span><br>
                        <small>Match Score: ${res.score}</small>
                    </div>`;
            } else {
                // Gagal validasi
                hasil.innerHTML = `
                    <div class="invalid">
                        ❌ VALIDATION FAILED <br>
                        <span style="color:#fff; font-size:12px;">${res.message}</span><br>
                        <small>${res.note || ''}</small>
                    </div>`;
            }
        } catch (err) {
            hasil.innerHTML = "<span class='error'>Gagal terhubung ke API. Periksa koneksi internet atau API Key!</span>";
            console.error(err);
        }
    }
</script>

</body>
</html>
