<!doctype html>
<html ⚡ lang="id">
<head>
  <meta charset="utf-8">
  <title>Warisan Nusantara - 5 Musim Snack Spesifik</title>
  <link rel="canonical" href="https://websitemu.com/amp-snack-seasons-specific">
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  <meta name="theme-color" content="#111">

  <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>
  <script async src="https://cdn.ampproject.org/v0.js"></script>
  
  <script async custom-element="amp-carousel" src="https://cdn.ampproject.org/v0/amp-carousel-0.1.js"></script>
  <script async custom-element="amp-bind" src="https://cdn.ampproject.org/v0/amp-bind-0.1.js"></script>
  <script async custom-element="amp-animation" src="https://cdn.ampproject.org/v0/amp-animation-0.1.js"></script>

  <style amp-custom>
    /* Reset & Font */
    body { font-family: 'Inter', sans-serif; background: #111; color: #fff; margin: 0; overflow: hidden; }
    
    /* Layout Utama Atmosferik */
    .hero { position: relative; height: 100vh; width: 100%; overflow: hidden; }

    /* Background Dinamis (Layer paling belakang) */
    .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; transition: background 1s ease; z-index: 1; }

    /* Partikel Atmosfer Spesifik (SVG Overlay) */
    .particle-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    
    /* Menggunakan Pattern SVG untuk bentuk partikel spesifik */
    #particle-group rect { fill: url(#snackPattern); opacity: 0.8; }

    /* Header & Logo */
    header { padding: 30px; position: absolute; top: 0; width: 100%; z-index: 10; text-align: center; }
    .brand-logo { font-size: 0.9rem; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; color: #fff; opacity: 0.6; }

    /* Carousel Gambar */
    .product-carousel { flex: 1; display: flex; align-items: center; justify-content: center; z-index: 3; height: 75vh; margin-top: 10vh; }
    .slide-item { display: flex; align-items: center; justify-content: center; }
    
    /* Frame Gambar yang menonjol */
    .img-container { width: 85%; max-width: 380px; filter: drop-shadow(0 40px 80px rgba(0,0,0,0.7)); transition: transform 0.3s ease; }
    [visible] .img-container { transform: scale(1.03); } /* Subtle zoom */

    /* Detail Teks Rasa */
    .product-details { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px; text-align: center; z-index: 5; }
    .rasa-name { font-size: 1.6rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
    
    /* Tombol CTA MANTAP (Sticky & Pulse) */
    .cta-container { position: fixed; bottom: 0; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: center; z-index: 100; }
    .btn-buy { background: #fff; color: #000; padding: 20px 50px; border-radius: 50px; text-decoration: none; font-weight: 800; text-transform: uppercase; font-size: 0.95rem; letter-spacing: 2px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); animation: pulse 2s infinite; }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255,255,255,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }
  </style>
</head>
<body>

  <amp-state id="productData">
    <script type="application/json">
      {
        "currentIndex": 0,
        "items": [
          { "name": "KUE SUS COKLAT", "bg": "#1A0F0A", "pUrl": "sus_coklat_particle.png", "pSpeed": 1.8 },
          { "name": "BALADO PADANG", "bg": "#5F0808", "pUrl": "padang_keripik_particle.png", "pSpeed": 1.2 },
          { "name": "KUE BAWANG MEDAN", "bg": "#997300", "pUrl": "medan_bawang_particle.png", "pSpeed": 1.5 },
          { "name": "UNTIR UNTIR", "bg": "#3E2723", "pUrl": "untir_particle.png", "pSpeed": 1.4 },
          { "name": "BASRENG DAUN JERUK", "bg": "#37474F", "pUrl": "basreng_daun_particle.png", "pSpeed": 1.0 }
        ]
      }
    </script>
  </amp-state>

  <div class="hero">
    
    <div class="hero-bg" [style]="'background:' + productData.items[productData.currentIndex].bg"></div>
    
    <svg class="particle-overlay" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
          <pattern id="snackPattern" patternUnits="userSpaceOnUse" width="10" height="10">
            <image href="particleData.items[productData.currentIndex].pUrl" x="0" y="0" width="10" height="10" />
          </pattern>
        </defs>
        <g id="particle-group">
            <rect cx="10" cy="-15" width="4" height="6" rx="1"/>
            <rect cx="30" cy="-25" width="5" height="8" rx="1"/>
            <rect cx="50" cy="-35" width="3" height="10" rx="1"/>
            <rect cx="70" cy="-45" width="6" height="7" rx="1"/>
            <rect cx="90" cy="-55" width="4" height="9" rx="1"/>
            </g>
    </svg>

    <header>
      <div class="brand-logo">WARISAN NUSANTARA</div>
    </header>

    <amp-carousel class="product-carousel" width="100" height="100" layout="responsive" type="slides" autoplay delay="4500"
      on="slideChange:AMP.setState({ productData: {currentIndex: event.index}})">
      
      <div class="slide-item">
        <div class="img-container">
          <amp-img src="sus_coklat_transparant.png" width="400" height="400" layout="responsive"></amp-img>
        </div>
      </div>
      <div class="slide-item">
        <div class="img-container">
          <amp-img src="padang_balado_transparant.png" width="400" height="400" layout="responsive"></amp-img>
        </div>
      </div>
      <div class="slide-item">
        <div class="img-container">
          <amp-img src="medan_bawang_transparant.png" width="400" height="400" layout="responsive"></amp-img>
        </div>
      </div>
      </amp-carousel>

    <div class="product-details">
      <h1 class="rasa-name" [text]="productData.items[productData.currentIndex].name">WARISAN</h1>
    </div>

  </div>

  <div class="cta-container">
    <a href="https://websitemu.com/keranjang" class="btn-buy">Beli Sekarang</a>
  </div>

  <amp-animation id="animGroup" layout="nodisplay">
    <script type="application/json">
        {
          "selector": "#particle-group rect",
          "duration": "rand(0.8s, 1.5s)",
          "keyframes": [
            { "transform": "translateY(0) rotate(rand(-20deg, 20deg))", "opacity": 0 },
            { "transform": "translateY(110vh) rotate(rand(-40deg, 40deg))", "opacity": 1 }
          ],
          "fill": "both",
          "iterations": "infinite",
          "delay": "rand(0, 0.8s)"
        }
    </script>
  </amp-animation>
  
  <amp-animation id="onLoadAnim" layout="nodisplay">
      <script type="application/json">
        {
          "selector": "body",
          "on": "load:animGroup.start()"
        }
      </script>
  </amp-animation>

</body>
</html>
