<!doctype html>
<html ⚡ lang="id">
<head>
  <meta charset="utf-8">
  <title>5 Seasons Snack - Ultimate Experience</title>
  <link rel="canonical" href="https://websitemu.com">
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  <script async src="https://cdn.ampproject.org/v0.js"></script>
  <script async custom-element="amp-animation" src="https://cdn.ampproject.org/v0/amp-animation-0.1.js"></script>
  <script async custom-element="amp-carousel" src="https://cdn.ampproject.org/v0/amp-carousel-0.1.js"></script>
  <script async custom-element="amp-bind" src="https://cdn.ampproject.org/v0/amp-bind-0.1.js"></script>

  <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>

  <style amp-custom>
    body { background: #000; margin: 0; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; }
    .stage { position: relative; height: 100vh; width: 100%; background: #000; }

    /* LAYER 1: BACKGROUNDS */
    .bg-frame { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; z-index: 1; }
    .bg-active { opacity: 0.7; }
    .bg-frame amp-img img { object-fit: cover; }

    /* LAYER 2: RAIN EFFECTS (Z-INDEX 10) */
    .rain-system { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
    .rain-grp { display: none; }
    .active-rain { display: block; }
    .p-item { opacity: 0; }

    /* LAYER 3: UI CONTENT (Z-INDEX 20) */
    .content { position: absolute; width: 100%; height: 100%; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .carousel { width: 100%; height: 60vh; }
    .prod-view { filter: drop-shadow(0 20px 50px rgba(0,0,0,1)); }
    
    .label-box { text-align: center; margin-top: -30px; }
    .badge { background: #FFD700; color: #000; padding: 5px 15px; border-radius: 5px; font-weight: bold; font-size: 0.7rem; }
    .product-name { font-size: 2.5rem; margin: 10px 0; text-transform: uppercase; text-shadow: 3px 3px 10px #000; }
  </style>
</head>
<body>

  <amp-state id="st">
    <script type="application/json">
      {
        "idx": 0,
        "items": [
          {"n": "Sus Coklat", "e": "HUJAN COKLAT", "bg": "https://googleusercontent.com/image_generation_content/7"},
          {"n": "Balado Padang", "e": "BADAI PEDAS", "bg": "https://googleusercontent.com/image_generation_content/12"},
          {"n": "Kue Bawang", "e": "DAUN GUGUR", "bg": "https://googleusercontent.com/image_generation_content/13"},
          {"n": "Untir Untir", "e": "SALJU GULA", "bg": "https://googleusercontent.com/image_generation_content/10"},
          {"n": "Basreng Stick", "e": "CERAH JERUK", "bg": "https://googleusercontent.com/image_generation_content/14"}
        ]
      }
    </script>
  </amp-state>

  <div class="stage">
    <div class="bg-frame" [class]="'bg-frame ' + (st.idx == 0 ? 'bg-active' : '')"><amp-img src="https://googleusercontent.com/image_generation_content/7" layout="fill" alt="BG1"></amp-img></div>
    <div class="bg-frame" [class]="'bg-frame ' + (st.idx == 1 ? 'bg-active' : '')"><amp-img src="https://googleusercontent.com/image_generation_content/12" layout="fill" alt="BG2"></amp-img></div>
    <div class="bg-frame" [class]="'bg-frame ' + (st.idx == 2 ? 'bg-active' : '')"><amp-img src="https://googleusercontent.com/image_generation_content/13" layout="fill" alt="BG3"></amp-img></div>
    <div class="bg-frame" [class]="'bg-frame ' + (st.idx == 3 ? 'bg-active' : '')"><amp-img src="https://googleusercontent.com/image_generation_content/10" layout="fill" alt="BG4"></amp-img></div>
    <div class="bg-frame" [class]="'bg-frame ' + (st.idx == 4 ? 'bg-active' : '')"><amp-img src="https://googleusercontent.com/image_generation_content/14" layout="fill" alt="BG5"></amp-img></div>

    <svg class="rain-system" viewBox="0 0 100 100" preserveAspectRatio="none">
      <g class="rain-grp" [class]="'rain-grp ' + (st.idx == 0 ? 'active-rain' : '')">
        <circle class="p-item" fill="#3E2723" cx="20" cy="-10" r="1.5" />
        <circle class="p-item" fill="#3E2723" cx="50" cy="-20" r="2" />
        <circle class="p-item" fill="#3E2723" cx="80" cy="-5" r="1.2" />
      </g>
      <g class="rain-grp" [class]="'rain-grp ' + (st.idx == 1 ? 'active-rain' : '')">
        <rect class="p-item" fill="#D32F2F" x="25" y="-15" width="1" height="8" />
        <rect class="p-item" fill="#D32F2F" x="55" y="-5" width="1.2" height="10" />
        <rect class="p-item" fill="#D32F2F" x="85" y="-20" width="0.8" height="6" />
      </g>
      <g class="rain-grp" [class]="'rain-grp ' + (st.idx == 2 ? 'active-rain' : '')">
        <path class="p-item" fill="#C0CA33" d="M30,-10 Q35,-5 30,0 Q25,-5 30,-10" />
        <path class="p-item" fill="#C0CA33" d="M70,-20 Q75,-15 70,-10 Q65,-15 70,-20" />
      </g>
      <g class="rain-grp" [class]="'rain-grp ' + (st.idx == 3 ? 'active-rain' : '')">
        <circle class="p-item" fill="#FFF" cx="40" cy="-5" r="0.5" />
        <circle class="p-item" fill="#FFF" cx="60" cy="-15" r="0.7" />
      </g>
      <g class="rain-grp" [class]="'rain-grp ' + (st.idx == 4 ? 'active-rain' : '')">
        <rect class="p-item" fill="#4CAF50" x="20" y="-10" width="2" height="2" rx="1" />
        <rect class="p-item" fill="#4CAF50" x="80" y="-15" width="2" height="2" rx="1" />
      </g>
    </svg>

    <div class="content">
      <amp-carousel class="carousel" type="slides" layout="fill" autoplay delay="3000"
        on="slideChange:AMP.setState({st: {idx: event.index}})">
        <div class="slide"><amp-img class="prod-view" src="https://googleusercontent.com/image_generation_content/7" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="prod-view" src="https://googleusercontent.com/image_generation_content/12" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="prod-view" src="https://googleusercontent.com/image_generation_content/13" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="prod-view" src="https://googleusercontent.com/image_generation_content/10" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="prod-view" src="https://googleusercontent.com/image_generation_content/14" width="300" height="300" layout="responsive"></amp-img></div>
      </amp-carousel>

      <div class="label-box">
        <span class="badge" [text]="st.items[st.idx].e">HUJAN COKLAT</span>
        <h2 class="product-name" [text]="st.items[st.idx].n">Sus Coklat</h2>
      </div>
    </div>
  </div>

  <amp-animation id="falling" layout="nodisplay" trigger="visibility">
    <script type="application/json">
      {
        "selector": ".p-item",
        "duration": "2.5s",
        "iterations": "infinite",
        "keyframes": [
          { "transform": "translateY(0vh) rotate(0deg)", "opacity": 0 },
          { "transform": "translateY(110vh) rotate(360deg)", "opacity": 1 }
        ],
        "delay": "rand(0, 2s)"
      }
    </script>
  </amp-animation>

</body>
</html>
