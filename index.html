<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo 3D Tersnacks</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: #121212; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 2000px; /* Kedalaman 3D */
            animation: bg-lightning 6s infinite;
        }

        @keyframes bg-lightning {
            0%, 94%, 98%, 100% { background-color: #121212; }
            95%, 99% { background-color: #252525; }
        }

        /* --- PANGGUNG UTAMA --- */
        .stage {
            position: relative;
            width: 800px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* --- DISPLAY TENGAH --- */
        .central-display {
            position: relative;
            z-index: 10;
            text-align: center;
            transform: translateZ(20px);
        }

        .logo-top {
            width: 130px;
            filter: drop-shadow(0 0 10px #ffA500);
            margin-bottom: 10px;
        }

        .image-wrapper {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            border-radius: 50%;
            border: 6px solid #ffc107;
            background-image: url('https://i.postimg.cc/x1yD1PBH/e5f0873b-c76b-4312-88bc-3bd67981a550.gif');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 30px #ffc107;
            animation: pulse-glow 0.4s infinite alternate;
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 20px #ffc107; }
            to { box-shadow: 0 0 40px #00e5ff; border-color: #fff; }
        }

        .price-tag {
            font-size: 50px;
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
            margin: 10px 0;
        }

        /* --- SISTEM ORBIT 3D --- */
        .orbit-system {
            position: absolute;
            width: 750px;
            height: 750px;
            transform-style: preserve-3d;
            transform: rotateX(75deg); /* Miringkan orbit */
        }

        .orbit-visual-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px dashed rgba(0, 229, 255, 0.3);
            border-radius: 50%;
        }

        .spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotate-orbit 15s linear infinite;
        }

        @keyframes rotate-orbit {
            from { transform: rotateZ(0deg); }
            to { transform: rotateZ(360deg); }
        }

        /* --- ITEM BUNGKUSAN SNACK --- */
        .snack-item {
            position: absolute;
            width: 140px; 
            height: 180px;
            left: 50%;
            top: 50%;
            margin-left: -70px;
            margin-top: -90px;
            transform-style: preserve-3d;
        }

        .snack-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Melawan kemiringan orbit agar bungkusan tetap tegak */
            transform: rotateX(-75deg); 
            filter: drop-shadow(5px 15px 10px rgba(0,0,0,0.8));
            transition: all 0.3s;
        }

        .snack-label {
            position: absolute;
            bottom: -30px;
            width: 200px;
            left: -30px;
            text-align: center;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 4px;
            border-radius: 4px;
            transform: rotateX(-75deg);
            display: none; /* Muncul saat highlight */
        }

        .highlight img {
            transform: rotateX(-75deg) scale(1.3);
            filter: drop-shadow(0 0 20px #00e5ff);
        }

        .highlight .snack-label { display: block; }

    </style>
</head>
<body>

    <div class="stage">
        
        <div class="central-display">
            <img src="https://i.postimg.cc/hGYqktH0/download.png" class="logo-top">
            <div class="image-wrapper"></div>
            <div class="price-tag">3$</div>
            <div style="font-size: 14px; letter-spacing: 2px;">PROMO TER-DAHSYAT</div>
        </div>

        <div class="orbit-system">
            <div class="orbit-visual-ring"></div>
            <div id="snack-spinner" class="spinner">
                </div>
        </div>

    </div>

    <script>
        const snacks = [
            { name: "KUE SUS KERING COKLAT", img: "https://i.postimg.cc/nLX3vcfH/5a308155-4a39-40bc-b5ff-6c53942c6446.jpg" },
            { name: "KERIPIK BALADO PADANG", img: "https://i.postimg.cc/7LprzWcc/fc5d75bb-8868-4c74-80b9-289bc86bb0c1.jpg" },
            { name: "KUE BAWANG", img: "https://i.postimg.cc/W496fRjy/1904dff8-56e9-48b2-83c4-57a376284b27.jpg" },
            { name: "UNTIR UNTIR", img: "https://i.postimg.cc/3Rd6tFMx/09220392-ad87-478d-9fcf-0c67b1ba6cfb.jpg" },
            { name: "BASRENG ORIGINAL", img: "https://i.postimg.cc/sxBMf8kX/3428ff40-8068-4717-baf3-0bc8ffe5ef7f.jpg" }
        ];

        const spinner = document.getElementById('snack-spinner');
        const radius = 340; 

        snacks.forEach((snack, i) => {
            const angle = (i / snacks.length) * Math.PI * 2;
            const x = radius * Math.cos(angle);
            const y = radius * Math.sin(angle);

            const div = document.createElement('div');
            div.className = 'snack-item';
            div.id = `snack-${i}`;
            div.style.transform = `translate3d(${x}px, ${y}px, 0)`;

            div.innerHTML = `
                <img src="${snack.img}" alt="${snack.name}">
                <div class="snack-label">${snack.name}</div>
            `;
            spinner.appendChild(div);
        });

        // Efek Highlight bergantian
        let current = 0;
        setInterval(() => {
            document.querySelectorAll('.snack-item').forEach(el => el.classList.remove('highlight'));
            document.getElementById(`snack-${current}`).classList.add('highlight');
            current = (current + 1) % snacks.length;
        }, 3000);
    </script>
</body>
</html>
