<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Validasi Bank Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">API <span class="text-blue-600">Validasi</span></h1>
            <p class="text-slate-500 mt-2">Layanan cek nomor rekening bank & e-wallet otomatis</p>
        </div>

        <!-- Main Card -->
        <div class="bg-white shadow-xl shadow-blue-100/50 rounded-2xl p-8 border border-slate-100">
            <div class="space-y-5">
                <!-- Select Bank -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Pilih Bank / E-Wallet</label>
                    <select id="bank" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 transition-all outline-none font-medium">
                        <option value="bca">BCA (Bank Central Asia)</option>
                        <option value="mandiri">Mandiri</option>
                        <option value="bni">BNI</option>
                        <option value="bri">BRI</option>
                        <option value="cimb">CIMB Niaga</option>
                        <option value="gopay">GoPay</option>
                        <option value="dana">DANA</option>
                        <option value="ovo">OVO</option>
                    </select>
                </div>

                <!-- Input Rekening -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Nomor Rekening</label>
                    <input type="number" id="account" placeholder="Masukkan nomor rekening..." 
                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 transition-all outline-none text-lg font-semibold">
                </div>

                <!-- Button -->
                <button onclick="cekSekarang()" id="btnCek" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                    Cek Validasi Sekarang
                </button>
            </div>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden mt-8 text-center animate-pulse">
                <div class="inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-sm font-medium text-slate-500 mt-2">Memvalidasi data...</p>
            </div>

            <!-- Result Box -->
            <div id="result" class="hidden mt-8 p-6 rounded-2xl bg-blue-50 border border-blue-100">
                <div class="text-center">
                    <p class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-1">Nama Pemilik Rekening</p>
                    <h2 id="ownerName" class="text-2xl font-black text-slate-800 uppercase"></h2>
                    <div id="aiAnalysis" class="mt-4 pt-4 border-t border-blue-200 text-sm text-blue-700 italic leading-relaxed">
                        <!-- AI Tips dari Gemini -->
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-8 text-slate-400 text-xs font-medium uppercase tracking-widest">
            Powered by Premium API.CO.ID & Gemini
        </div>
    </div>

    <script>
        // MASUKKAN KEY KAMU DI SINI
        const COID_KEY = "xy9sQ9AcQwFZcNeiSTSrwZoEDGh9dsdW7e8IJ2GqAlgsb72oqX";
        const GEMINI_KEY = "AIzaSyDoC3xsK5VY8lLKlWgGkCKW7rooQvylORo";

        async function cekSekarang() {
            const bank = document.getElementById('bank').value;
            const account = document.getElementById('account').value;
            const btn = document.getElementById('btnCek');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            if(!account) return alert("Nomor rekening wajib diisi!");

            // UI Reset
            btn.classList.add('hidden');
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                // 1. Cek Rekening ke api.co.id
                const response = await fetch(`https://api.co.id/v1/bank/check?bank=${bank}&account=${account}`, {
                    headers: { 'Authorization': `Bearer ${COID_KEY}` }
                });
                const resData = await response.json();

                if (resData.status === "success" || resData.status === 200) {
                    const nama = resData.data.name;
                    document.getElementById('ownerName').innerText = nama;

                    // 2. Tanya Gemini AI untuk tips keamanan
                    const aiResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: `Berikan tips singkat keamanan transfer ke bank ${bank} atas nama ${nama}. Maksimal 15 kata.` }] }] })
                    });
                    const aiData = await aiResponse.json();
                    const aiText = aiData.candidates[0].content.parts[0].text;
                    
                    document.getElementById('aiAnalysis').innerText = "AI Tips: " + aiText;
                    result.classList.remove('hidden');
                } else {
                    alert("Data tidak ditemukan! Pastikan nomor rekening dan bank benar.");
                }
            } catch (error) {
                alert("Gagal memproses data. Cek koneksi atau API Key kamu.");
            } finally {
                btn.classList.remove('hidden');
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
