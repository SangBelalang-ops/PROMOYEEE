<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Rekening Tersnacks</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: #111; border: 2px solid #ff0000; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; box-shadow: 0 0 20px #ff0000; }
        h2 { color: #ff0000; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        select, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #333; box-sizing: border-box; font-size: 14px; }
        select, input { background: #222; color: #fff; }
        button { background: #ff0000; color: #fff; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b30000; box-shadow: 0 0 10px #ff0000; }
        #result { margin-top: 20px; padding: 15px; border-top: 1px solid #333; text-align: center; font-size: 18px; min-height: 30px; }
        .success { color: #00ff00; font-weight: bold; text-transform: uppercase; }
        .error { color: #ffae00; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>TERSNACKS CHECK</h2>
    
    <label>Pilih Bank / E-Wallet:</label>
    <select id="bankCode">
        <option value="">-- Memuat Daftar... --</option>
    </select>
    
    <input type="text" id="accNumber" placeholder="Nomor Rekening / HP">
    
    <button onclick="cekRekening()">PERIKSA SEKARANG</button>

    <div id="result">Menunggu input...</div>
</div>

<script>
    const API_BASE = "https://api-rekening.lfourr.com";
    const API_KEY = "aFVBKbUGW15JPwN3to5L7DiyN0QY1syLI4p4jVQ5N0VnsgYHRs";

    // 1. OTOMATIS AMBIL SEMUA LIST BANK & EWALLET SAAT WEB DIBUKA
    async function loadLists() {
        const select = document.getElementById('bankCode');
        try {
            const [resBank, resEwal] = await Promise.all([
                fetch(`${API_BASE}/listBank`),
                fetch(`${API_BASE}/listEwallet`)
            ]);
            const banks = await resBank.json();
            const ewals = await resEwal.json();

            let options = '<option value="">-- PILIH BANK / EWALLET --</option>';
            
            // Masukin Bank
            banks.data.forEach(b => { 
                options += `<option value="${b.code}">${b.name.toUpperCase()}</option>`; 
            });
            // Masukin E-Wallet
            ewals.data.forEach(e => { 
                options += `<option value="${e.code}">📱 ${e.name.toUpperCase()}</option>`; 
            });
            
            select.innerHTML = options;
        } catch (err) {
            select.innerHTML = '<option value="">Gagal Load Data API</option>';
        }
    }

    // 2. FUNGSI CEK NAMA REKENING
    async function cekRekening() {
        const bank = document.getElementById('bankCode').value;
        const norek = document.getElementById('accNumber').value;
        const hasil = document.getElementById('result');

        if(!bank || !norek) {
            hasil.innerHTML = "<span class='error'>Pilih bank & isi nomor!</span>";
            return;
        }
        
        hasil.innerText = "Sabar, lagi dicek...";

        try {
            const response = await fetch(`${API_BASE}/getBankAccount?bankCode=${bank}&accountNumber=${norek}`, {
                headers: { 'x-api-key': API_KEY }
            });
            const res = await response.json();

            if (res.status === true || res.status === "success") {
                hasil.innerHTML = `NAMA:<br><span class="success">${res.data.name || res.data.account_name}</span>`;
            } else {
                hasil.innerHTML = "<span class='error'>Data tidak ditemukan!</span>";
            }
        } catch (err) {
            hasil.innerHTML = "<span class='error'>Server API Down / Error!</span>";
        }
    }

    // Jalankan load list otomatis
    loadLists();
</script>

</body>
</html>
