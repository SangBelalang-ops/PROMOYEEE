<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN TOOLS | REK-CHECKER</title>
    <style>
        :root { --primary: #f39c12; --bg: #0a0a0a; --card: #161616; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8em; color: #888; font-weight: bold; }
        select, input { width: 100%; padding: 14px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 1em; }
        button { width: 100%; padding: 16px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #e67e22; transform: scale(1.02); }
        #hasil { margin-top: 25px; padding: 20px; background: #000; border-radius: 12px; min-height: 80px; text-align: center; border: 1px dashed #444; display: flex; flex-direction: column; justify-content: center; }
        .nama-display { color: var(--primary); font-size: 1.4em; font-weight: bold; text-transform: uppercase; }
        .loading-msg { color: #888; font-style: italic; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <h2>REK-FINDER</h2>
    
    <div class="input-group">
        <label>PILIH BANK / E-WALLET</label>
        <select id="bank">
            <option value="bca">BCA</option>
            <option value="mandiri">MANDIRI</option>
            <option value="bni">BNI</option>
            <option value="bri">BRI</option>
            <option value="cimb">CIMB NIAGA</option>
            <option value="permata">PERMATA</option>
            <option value="gopay">GOPAY</option>
            <option value="dana">DANA</option>
            <option value="ovo">OVO</option>
        </select>
    </div>

    <div class="input-group">
        <label>NOMOR REKENING / HP</label>
        <input type="number" id="norek" placeholder="Input nomor rekening...">
    </div>

    <button onclick="prosesCek()">CEK SEKARANG</button>

    <div id="hasil">
        <span style="color: #444; font-size: 0.9em;">Input nomor untuk memulai...</span>
    </div>
</div>

<script>
async function prosesCek() {
    const bank = document.getElementById('bank').value;
    const norek = document.getElementById('norek').value;
    const display = document.getElementById('hasil');
    
    // URL Google Apps Script lo yang baru
    const gasURL = "https://script.google.com/macros/s/AKfycbzbr6UaOJ7Nm1uYbEHjqvGnI-3uiV528Po8g8ALlArd8pK2dKTetGP9QKhQv-xqCvnW/exec"; 

    if (!norek) {
        alert("Nomornya diisi dulu, Bosku!");
        return;
    }

    display.innerHTML = '<span class="loading-msg">MENCARI DATA...</span>';

    try {
        // Tembak ke Google Apps Script (Anti-CORS)
        const response = await fetch(`${gasURL}?bank=${bank}&no=${norek}`);
        const data = await response.json();

        if (data.status === "success" || data.status === true) {
            display.innerHTML = `
                <div style="font-size: 0.7em; color: #888; margin-bottom: 5px;">ATAS NAMA:</div>
                <div class="nama-display">${data.data.name || data.data.account_name}</div>
            `;
        } else {
            display.innerHTML = '<span style="color: #ff4444;">DATA TIDAK DITEMUKAN</span><br><small style="color: #555;">Cek nomor atau bank lagi.</small>';
        }
    } catch (err) {
        display.innerHTML = '<span style="color: #ff4444;">ERROR SERVER</span><br><small style="color: #555;">API mungkin sedang limit.</small>';
    }
}
</script>

</body>
</html>
