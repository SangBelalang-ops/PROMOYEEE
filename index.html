<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tersnacks 3D Orbit Promo</title>
    <style>
        /* --- RESET & LAYOUT --- */
        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; 
            overflow: hidden;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Efek Kilat Global */
            animation: bg-lightning 6s infinite;
            /* Penting untuk Efek 3D */
            perspective: 1500px; 
        }

        /* ⚡ ANIMASI PETIR BACKGROUND ⚡ */
        @keyframes bg-lightning {
            0%, 95%, 98% { background-color: #1a1a1a; }
            96%, 99% { background-color: #2a2a2a; }
        }

        /* --- KONTENER UTAMA --- */
        .stage {
            position: relative;
            width: 800px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Membuat semua anak panggung dalam ruang 3D */
            transform-style: preserve-3d;
        }

        /* --- PRODUK TENGAH (STatis) --- */
        .central-display {
            position: relative;
            width: 300px;
            text-align: center;
            z-index: 10;
            /* Mengangkat sedikit agar di tengah cincin */
            transform: translateZ(50px); 
        }

        .logo-top {
            width: 150px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255,165,0,0.9));
        }

        /* Area GIF Tengah dengan Listrik */
        .image-wrapper {
            width: 250px;
            height: 250px;
            margin: 0 auto 20px;
            overflow: hidden;
            border-radius: 50%; /* Bulat sempurna */
            border: 5px solid #ffc107;
            background-image: url('https://i.postimg.cc/x1yD1PBH/e5f0873b-c76b-4312-88bc-3bd67981a550.gif');
            background-size: cover;
            background-position: center;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 193, 7, 0.7);
            animation: electric-glow-central 0.3s infinite alternate;
        }

        @keyframes electric-glow-central {
            0% { border-color: #ffc107; box-shadow: 0 0 15px #ffc107; }
            100% { border-color: #fff; box-shadow: 0 0 35px #00e5ff, 0 0 15px #fff; }
        }

        .central-price {
            font-size: 48px;
            color: #00ff00;
            margin: 0;
            text-shadow: 0 0 20px rgba(0,255,0,0.8);
            font-style: italic;
        }

        /* --- SISTEM ORBIT 3D (CINCIN) --- */
        .orbit-system {
            position: absolute;
            width: 700px; /* Diameter Cincin */
            height: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            /* Memiringkan cincin agar terlihat 3D (seperti Saturnus) */
            transform: rotateX(70deg) rotateY(0deg); 
        }

        /* Cincin Visual (Garis Putus-putus) */
        .orbit-ring-visual {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px dashed rgba(0, 229, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            /* Memastikan visual cincin miring mengikuti system */
            transform: translateZ(0px); 
        }

        /* Kontener yang BERPUTAR */
        .orbit-spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            /* Animasi putaran utama */
            animation: orbit-rotate-3d 20s linear infinite;
        }

        @keyframes orbit-rotate-3d {
            from { transform: rotateZ(0deg); }
            to { transform: rotateZ(360deg); }
        }

        /* --- ITEM PRODUK BUNGKUSAN (Muter) --- */
        .orbit-item {
            position: absolute;
            width: 120px; /* Ukuran Bungkusan */
            height: 160px; /* Sesuaikan proporsi bungkusan PNG-mu */
            /* Transparan agar hanya bungkusan yang terlihat */
            background: transparent; 
            transform-style: preserve-3d;
            /* Titik rotasi di tengah item */
            margin-left: -60px; /* Setengah width */
            margin-top: -80px;  /* Setengah height */
        }

        .orbit-item img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Memastikan PNG tidak terpotong */
            /* EFEK PENTING: Menangkal kemiringan cincin agar produk tetap tegak menghadap layar */
            transform: rotateX(-70deg); 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: all 0.3s ease;
        }

        /* Efek Listrik saat Produk Disorot (Highlight) */
        .orbit-item.highlight img {
            filter: drop-shadow(0 0 20px #00e5ff) drop-shadow(0 0 10px #fff) scale(1.2);
        }

    </style>
</head>
<body>

    <div class="stage">
        
        <div class="central-display">
            <a href="https://tersnacks.pages.dev" target="_blank">
                <img src="https://i.postimg.cc/hGYqktH0/download.png" class="logo-top" alt="Logo Tersnacks">
            </a>
            <div class="image-wrapper"></div>
            <div class="central-price">3$</div>
        </div>

        <div class="orbit-system">
            <div class="orbit-ring-visual"></div>
            <div id="orbit-spinner" class="orbit-spinner">
                </div>
        </div>

    </div>

    <script>
        // --- DATA PRODUK BARU (GANTI LINK FOTO PNG DISINI) ---
        const products = [
            { id: 1, name: "KUE SUS", img: "https://placehold.co/120x160/png?text=SUS+PNG" },
            { id: 2, name: "BALADO", img: "https://placehold.co/120x160/png?text=BALADO+PNG" },
            { id: 3, name: "KUE BAWANG", img: "https://placehold.co/120x160/png?text=BAWANG+PNG" },
            { id: 4, name: "UNTIR UNTIR", img: "https://placehold.co/120x160/png?text=UNTIR+PNG" },
            { id: 5, name: "BASRENG", img: "https://placehold.co/120x160/png?text=BASRENG+PNG" }
        ];

        const spinner = document.getElementById('orbit-spinner');
        const totalItems = products.length;
        const radius = 350; // Jarak dari tengah ke bungkusan

        // 1. Render Bungkusan di Posisi 3D
        products.forEach((product, i) => {
            const angle = (i / totalItems) * Math.PI * 2;
            
            // Hitung posisi X dan Y di lingkaran datar
            const x = radius * Math.cos(angle);
            const y = radius * Math.sin(angle);

            const itemDiv = document.createElement('div');
            itemDiv.className = 'orbit-item';
            itemDiv.id = `product-${i}`;
            
            // Atur posisi awal item (masih datar di cincin)
            // Kita pakai translate3d untuk performa
            itemDiv.style.transform = `translate3d(${x}px, ${y}px, 0px)`;

            const img = document.createElement('img');
            img.src = product.img;
            img.alt = product.name;
            
            itemDiv.appendChild(img);
            spinner.appendChild(itemDiv);
        });

        // 2. Logika Highlight Produk (Opsional, agar mata tertuju ke 1 produk)
        let currentIndex = 0;
        function highlightNextProduct() {
            // Hapus highlight lama
            document.querySelectorAll('.orbit-item').forEach(el => el.classList.remove('highlight'));
            
            // Tambah highlight baru
            const currentItem = document.getElementById(`product-${currentIndex}`);
            if (currentItem) {
                currentItem.classList.remove('lowlight'); // Pastikan tidak redup
                currentItem.classList.add('highlight');
            }

            currentIndex = (currentIndex + 1) % products.length;
        }

        // Jalankan highlight tiap 4 detik
        highlightNextProduct(); 
        setInterval(highlightNextProduct, 4000);

    </script>
</body>
</html>
