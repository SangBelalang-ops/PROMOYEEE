<!doctype html>
<html ⚡ lang="id">
<head>
  <meta charset="utf-8">
  <title>Warisan Nusantara - 5 Seasons</title>
  <link rel="canonical" href="https://websitemu.com">
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  <script async src="https://cdn.ampproject.org/v0.js"></script>
  <script async custom-element="amp-animation" src="https://cdn.ampproject.org/v0/amp-animation-0.1.js"></script>
  <script async custom-element="amp-carousel" src="https://cdn.ampproject.org/v0/amp-carousel-0.1.js"></script>
  <script async custom-element="amp-bind" src="https://cdn.ampproject.org/v0/amp-bind-0.1.js"></script>

  <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>

  <style amp-custom>
    body { font-family: 'Arial Black', sans-serif; background: #000; margin: 0; overflow: hidden; color: #fff; }
    .viewport { position: relative; height: 100vh; width: 100%; }

    /* --- LAYER 1: BACKGROUND (LINK DARI GAMBAR TADI) --- */
    .bg-layer { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1.2s ease-in-out; z-index: 1; }
    .bg-active { opacity: 0.5; }
    .bg-layer amp-img img { object-fit: cover; }

    /* --- LAYER 2: RAIN EFFECT ENGINE --- */
    .rain-stage { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
    .rain-group { display: none; }
    .show-rain { display: block; }
    
    .p-item { opacity: 0; }
    .c1 { fill: #3E2723; } /* Coklat */
    .c2 { fill: #D32F2F; } /* Merah Balado */
    .c3 { fill: #C0CA33; } /* Hijau Bawang */
    .c4 { fill: #FFF; }    /* Putih Gula */
    .c5 { fill: #4CAF50; } /* Hijau Daun Jeruk */

    /* --- LAYER 3: PRODUCT & UI --- */
    .ui-wrap { position: absolute; width: 100%; height: 100%; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .carousel-main { width: 100%; height: 55vh; }
    .prod-img { filter: drop-shadow(0 30px 60px rgba(0,0,0,0.9)); }
    
    .info-box { text-align: center; margin-top: -20px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .tagline { background: #FFD700; color: #000; padding: 4px 15px; border-radius: 4px; font-size: 0.7rem; letter-spacing: 2px; }
    .title { font-size: 2.2rem; margin: 10px 0; text-transform: uppercase; }
  </style>
</head>
<body>

  <amp-state id="st">
    <script type="application/json">
      {
        "idx": 0,
        "items": [
          {"n": "Sus Coklat", "e": "HUJAN COKLAT", "bg": "https://googleusercontent.com/image_generation_content/7"},
          {"n": "Balado Padang", "e": "BADAI PEDAS", "bg": "https://googleusercontent.com/image_generation_content/12"},
          {"n": "Kue Bawang", "e": "DAUN GUGUR", "bg": "https://googleusercontent.com/image_generation_content/13"},
          {"n": "Untir Untir", "e": "SALJU GULA", "bg": "https://googleusercontent.com/image_generation_content/10"},
          {"n": "Basreng Stick", "e": "CERAH JERUK", "bg": "https://googleusercontent.com/image_generation_content/14"}
        ]
      }
    </script>
  </amp-state>

  <div class="viewport">
    
    <div class="bg-layer" [class]="'bg-layer ' + (st.idx == 0 ? 'bg-active' : '')"><amp-img src="https://googleusercontent.com/image_generation_content/7" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (st.idx == 1 ? 'bg-active' : '')"><amp-img src="https://googleusercontent.com/image_generation_content/12" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (st.idx == 2 ? 'bg-active' : '')"><amp-img src="https://googleusercontent.com/image_generation_content/13" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (st.idx == 3 ? 'bg-active' : '')"><amp-img src="https://googleusercontent.com/image_generation_content/10" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (st.idx == 4 ? 'bg-active' : '')"><amp-img src="https://googleusercontent.com/image_generation_content/14" layout="fill"></amp-img></div>

    <svg class="rain-stage" viewBox="0 0 100 100" preserveAspectRatio="none">
      <g class="rain-group" [class]="'rain-group ' + (st.idx == 0 ? 'show-rain' : '')">
        <circle class="p-item c1" cx="20" cy="-5" r="1.5" /><circle class="p-item c1" cx="60" cy="-15" r="1.2" />
      </g>
      <g class="rain-group" [class]="'rain-group ' + (st.idx == 1 ? 'show-rain' : '')">
        <rect class="p-item c2" x="30" y="-10" width="1" height="8" rx="0.5" /><rect class="p-item c2" x="70" y="-20" width="1" height="8" rx="0.5" />
      </g>
      <g class="rain-group" [class]="'rain-group ' + (st.idx == 2 ? 'show-rain' : '')">
        <path class="p-item c3" d="M40,-5 Q45,0 40,5 Q35,0 40,-5" /><path class="p-item c3" d="M80,-15 Q85,-10 80,-5 Q75,-10 80,-15" />
      </g>
      <g class="rain-group" [class]="'rain-group ' + (st.idx == 3 ? 'show-rain' : '')">
        <circle class="p-item c4" cx="25" cy="-5" r="0.6" /><circle class="p-item c4" cx="75" cy="-10" r="0.5" />
      </g>
      <g class="rain-group" [class]="'rain-group ' + (st.idx == 4 ? 'show-rain' : '')">
        <rect class="p-item c5" x="35" y="-10" width="2" height="2" rx="1" /><rect class="p-item c5" x="85" y="-15" width="2" height="2" rx="1" />
      </g>
    </svg>

    <div class="ui-wrap">
      <amp-carousel class="carousel-main" type="slides" layout="fill" autoplay delay="3000"
        on="slideChange:AMP.setState({st: {idx: event.index}})">
        <div class="slide"><amp-img class="prod-img" src="prod_sus.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="prod-img" src="prod_balado.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="prod-img" src="prod_bawang.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="prod-img" src="prod_untir.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="prod-img" src="prod_basreng.png" width="300" height="300" layout="responsive"></amp-img></div>
      </amp-carousel>

      <div class="info-box">
        <span class="tagline" [text]="st.items[st.idx].e">HUJAN COKLAT</span>
        <h1 class="title" [text]="st.items[st.idx].n">Sus Coklat</h1>
      </div>
    </div>
  </div>

  <amp-animation id="rainEngine" layout="nodisplay" trigger="visibility">
    <script type="application/json">
      {
        "selector": ".p-item",
        "duration": "2s",
        "iterations": "infinite",
        "keyframes": [
          { "transform": "translateY(0) rotate(0deg)", "opacity": 0 },
          { "transform": "translateY(110vh) rotate(360deg)", "opacity": 1 }
        ],
        "delay": "rand(0, 2s)"
      }
    </script>
  </amp-animation>

</body>
</html>
