<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REK-FINDER PRO v2.5</title>
    <style>
        :root { --primary: #00ff88; --bg: #050505; --card: #111; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; border: 1px solid #222; box-shadow: 0 0 30px rgba(0,255,136,0.1); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 5px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .subtitle { text-align: center; font-size: 0.65em; color: #555; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.75em; color: #888; font-weight: bold; }
        select, input { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 1em; outline: none; }
        button { width: 100%; padding: 16px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #00cc6e; transform: scale(1.02); }
        #hasil { margin-top: 25px; padding: 20px; background: #000; border-radius: 12px; min-height: 80px; text-align: center; border: 1px dashed #333; }
        .nama-res { color: var(--primary); font-size: 1.3em; font-weight: bold; text-transform: uppercase; }
        .loading { color: #888; font-style: italic; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="container">
    <h2>REK-FINDER</h2>
    <div class="subtitle">PRIVATE ADMIN TOOLS v2.5</div>
    
    <div class="input-group">
        <label>PILIH BANK / E-WALLET</label>
        <select id="bank">
            <option value="bca">BCA</option>
            <option value="mandiri">MANDIRI</option>
            <option value="bni">BNI</option>
            <option value="bri">BRI</option>
            <option value="cimb">CIMB NIAGA</option>
            <option value="permata">PERMATA</option>
            <option value="dana">DANA</option>
            <option value="gopay">GOPAY / OVO</option>
            <option value="linkaja">LINKAJA</option>
        </select>
    </div>

    <div class="input-group">
        <label>NOMOR REKENING / HP</label>
        <input type="number" id="norek" placeholder="Input nomor...">
    </div>

    <button onclick="prosesCek()">CEK DATA SEKARANG</button>

    <div id="hasil">
        <span style="color: #333;">HASIL AKAN MUNCUL DI SINI</span>
    </div>
</div>

<script>
async function prosesCek() {
    const bank = document.getElementById('bank').value;
    const norek = document.getElementById('norek').value;
    const display = document.getElementById('hasil');
    
    // URL GOOGLE SCRIPT TERBARU LO
    const gasURL = "https://script.google.com/macros/s/AKfycbwswg6DwurFGjxiyTOA_a_69VwqKsh-7sPuGrgrhRhX4weBtKfUsaToInG-HuykHcokmg/exec"; 

    if (!norek) return alert("Nomornya mana, Bos?");

    display.innerHTML = '<span class="loading">MENGHUBUNGI SERVER GOOGLE...</span>';

    try {
        const response = await fetch(`${gasURL}?bank=${bank}&no=${norek}`);
        const data = await response.json();

        if (data.status === "success" && data.nama) {
            display.innerHTML = `
                <div style="font-size: 0.7em; color: #888; margin-bottom: 5px;">ATAS NAMA:</div>
                <div class="nama-res">${data.nama}</div>
            `;
        } else {
            display.innerHTML = '<span style="color: #ff4444;">TIDAK DITEMUKAN</span><br><small style="color: #444;">API limit atau bank sedang offline.</small>';
        }
    } catch (err) {
        display.innerHTML = '<span style="color: #ff4444;">KONEKSI GAGAL</span><br><small style="color: #444;">Pastikan URL Script benar.</small>';
    }
}
</script>

</body>
</html>
