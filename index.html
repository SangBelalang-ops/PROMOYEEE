<!doctype html>
<html ⚡ lang="id">
<head>
  <meta charset="utf-8">
  <title>5 Seasons Snack - Ultimate</title>
  <link rel="canonical" href="https://websitemu.com">
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  <script async src="https://cdn.ampproject.org/v0.js"></script>
  <script async custom-element="amp-animation" src="https://cdn.ampproject.org/v0/amp-animation-0.1.js"></script>
  <script async custom-element="amp-carousel" src="https://cdn.ampproject.org/v0/amp-carousel-0.1.js"></script>
  <script async custom-element="amp-bind" src="https://cdn.ampproject.org/v0/amp-bind-0.1.js"></script>

  <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>

  <style amp-custom>
    body { font-family: sans-serif; background: #000; margin: 0; overflow: hidden; color: #fff; }
    .viewport { position: relative; height: 100vh; width: 100%; }

    /* LAYER 1: BACKGROUND */
    .bg-layer { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s; z-index: 1; }
    .bg-active { opacity: 0.4; }

    /* LAYER 2: RAIN/PARTICLE ENGINE (WAJIB Z-INDEX TINGGI) */
    .particle-stage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
    .p-group { display: none; }
    .active-env { display: block; }
    
    /* Warna & Bentuk Partikel Spesifik */
    .sus-choco { fill: #3E2723; }  /* Hujan Coklat */
    .padang-hot { fill: #D32F2F; } /* Badai Balado Panjang */
    .medan-leaf { fill: #C0CA33; } /* Kue Bawang Medan */
    .untir-sugar { fill: #FFFFFF; } /* Salju Gula */
    .basreng-lime { fill: #4CAF50; } /* Daun Jeruk Basreng */

    /* LAYER 3: PRODUCT UI */
    .ui { position: absolute; width: 100%; height: 100%; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .carousel { width: 100%; height: 50vh; }
    .product-img { filter: drop-shadow(0 20px 40px rgba(0,0,0,1)); }
    
    .info { text-align: center; margin-top: 20px; }
    .season-label { background: #FFD700; color: #000; padding: 5px 15px; border-radius: 5px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
    .title { font-size: 2rem; font-weight: 900; margin: 10px 0; text-transform: uppercase; }
  </style>
</head>
<body>

  <amp-state id="st">
    <script type="application/json">
      {
        "index": 0,
        "items": [
          {"n": "Sus Coklat", "e": "HUJAN COKLAT"},
          {"n": "Balado Padang", "e": "BADAI PEDAS"},
          {"n": "Kue Bawang", "e": "DAUN GUGUR"},
          {"n": "Untir Untir", "e": "SALJU GULA"},
          {"n": "Basreng Jeruk", "e": "HARI CERAH"}
        ]
      }
    </script>
  </amp-state>

  <div class="viewport">
    
    <div class="bg-layer" [class]="'bg-layer ' + (st.index == 0 ? 'bg-active' : '')"><amp-img src="bg1.jpg" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (st.index == 1 ? 'bg-active' : '')"><amp-img src="bg2.jpg" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (st.index == 2 ? 'bg-active' : '')"><amp-img src="bg3.jpg" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (st.index == 3 ? 'bg-active' : '')"><amp-img src="bg4.jpg" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (st.index == 4 ? 'bg-active' : '')"><amp-img src="bg5.jpg" layout="fill"></amp-img></div>

    <svg class="particle-stage" viewBox="0 0 100 100" preserveAspectRatio="none">
      <g class="p-group" [class]="'p-group ' + (st.index == 0 ? 'active-env' : '')">
        <circle class="p-item sus-choco" cx="10" cy="-5" r="1.5" />
        <circle class="p-item sus-choco" cx="40" cy="-15" r="1.2" />
        <circle class="p-item sus-choco" cx="70" cy="-10" r="1.8" />
        <circle class="p-item sus-choco" cx="90" cy="-20" r="1" />
      </g>
      <g class="p-group" [class]="'p-group ' + (st.index == 1 ? 'active-env' : '')">
        <rect class="p-item padang-hot" x="15" y="-10" width="1" height="6" rx="0.5" />
        <rect class="p-item padang-hot" x="45" y="-20" width="1.2" height="7" rx="0.5" />
        <rect class="p-item padang-hot" x="75" y="-15" width="0.8" height="5" rx="0.5" />
      </g>
      <g class="p-group" [class]="'p-group ' + (st.index == 2 ? 'active-env' : '')">
        <path class="p-item medan-leaf" d="M20,-5 Q25,0 20,5 Q15,0 20,-5" />
        <path class="p-item medan-leaf" d="M55,-15 Q60,-10 55,-5 Q50,-10 55,-15" />
        <path class="p-item medan-leaf" d="M85,-10 Q90,-5 85,0 Q80,-5 85,-10" />
      </g>
      <g class="p-group" [class]="'p-group ' + (st.index == 3 ? 'active-env' : '')">
        <circle class="p-item untir-sugar" cx="30" cy="-5" r="0.4" />
        <circle class="p-item untir-sugar" cx="60" cy="-15" r="0.6" />
        <circle class="p-item untir-sugar" cx="80" cy="-8" r="0.5" />
      </g>
      <g class="p-group" [class]="'p-group ' + (st.index == 4 ? 'active-env' : '')">
        <rect class="p-item basreng-lime" x="25" y="-10" width="2" height="2" rx="1" />
        <rect class="p-item basreng-lime" x="55" y="-18" width="2" height="2" rx="1" />
        <rect class="p-item basreng-lime" x="85" y="-12" width="2" height="2" rx="1" />
      </g>
    </svg>

    <div class="ui">
      <amp-carousel class="carousel" type="slides" layout="fill" autoplay delay="3000"
        on="slideChange:AMP.setState({st: {index: event.index}})">
        <div class="slide"><amp-img class="product-img" src="prod1.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="product-img" src="prod2.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="product-img" src="prod3.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="product-img" src="prod4.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="product-img" src="prod5.png" width="300" height="300" layout="responsive"></amp-img></div>
      </amp-carousel>

      <div class="info">
        <span class="season-label" [text]="st.items[st.index].e">HUJAN COKLAT</span>
        <h1 class="title" [text]="st.items[st.index].n">Sus Coklat</h1>
      </div>
    </div>
  </div>

  <amp-animation id="rainEngine" layout="nodisplay" trigger="visibility">
    <script type="application/json">
      {
        "selector": ".p-item",
        "duration": "2.5s",
        "iterations": "infinite",
        "keyframes": [
          { "transform": "translateY(0) rotate(0deg)", "opacity": 0 },
          { "transform": "translateY(110vh) rotate(360deg)", "opacity": 1 }
        ],
        "delay": "rand(0, 2.5s)"
      }
    </script>
  </amp-animation>

</body>
</html>
